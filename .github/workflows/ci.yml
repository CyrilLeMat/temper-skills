name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test suite
        run: pytest -q
      - name: Validate the canonical trees (dogfood the CI gate)
        run: |
          temper-skills validate examples/dog_food/output/dog_food_checker.py \
            examples/dog_food/input/validation_set.json --fn can_dog_eat
          temper-skills validate examples/ticket_routing/output/route_ticket.py \
            examples/ticket_routing/input/validation_set.json --fn route_ticket --match exact
          temper-skills validate examples/license_compat/output/assess_license.py \
            examples/license_compat/input/validation_set.json --fn assess_license --match exact
          temper-skills validate examples/ankle_sprain/output/assess_ankle.py \
            examples/ankle_sprain/input/validation_set.json --fn assess_ankle --match exact
