name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/ruff-action@v3
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Type check
        run: |
          pip install -e ".[dev]"
          mypy

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # coverage badge data branch
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test suite
        run: pytest -q --cov
      - name: Publish coverage badge data
        if: matrix.python-version == '3.12' && github.ref == 'refs/heads/main'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Validate the canonical trees (dogfood the CI gate)
        run: |
          temper-skills validate examples/dog_food/output/dog-food/scripts/can_dog_eat.py \
            examples/dog_food/output/dog-food/assets/can_dog_eat.validation.jsonl --fn can_dog_eat
          temper-skills validate examples/ticket_routing/output/ticket-routing/scripts/route_ticket.py \
            examples/ticket_routing/output/ticket-routing/assets/route_ticket.validation.jsonl --fn route_ticket
          temper-skills validate examples/license_compat/output/license-compat/scripts/assess_license.py \
            examples/license_compat/output/license-compat/assets/assess_license.validation.jsonl --fn assess_license
          temper-skills validate examples/ankle_sprain/output/ankle-sprain/scripts/assess_ankle.py \
            examples/ankle_sprain/output/ankle-sprain/assets/assess_ankle.validation.jsonl --fn assess_ankle
          temper-skills validate examples/parking/output/parking/scripts/can_i_park.py \
            examples/parking/output/parking/assets/can_i_park.validation.jsonl --fn can_i_park
